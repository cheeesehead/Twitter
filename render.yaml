services:
  - type: worker
    name: broad-st-takes-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_APPROVALS_CHANNEL_ID
        sync: false
      - key: DISCORD_LOG_CHANNEL_ID
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
